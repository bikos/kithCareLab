<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KithCare - Contact Us Form Registration</title>
</head>
<body>
    <!-- Hidden form for Netlify Forms detection crawler -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
        <label>Name: <input type="text" name="name" /></label>
        <label>Email: <input type="email" name="email" /></label>
        <label>Phone: <input type="tel" name="phone" /></label>
        <label>Role: <input type="text" name="role" /></label>
        <label>Message: <textarea name="message"></textarea></label>
        
        <!-- CRM and Marketing Attribution Fields -->
        <label>UTM Source: <input type="hidden" name="utm_source" /></label>
        <label>UTM Medium: <input type="hidden" name="utm_medium" /></label>
        <label>UTM Campaign: <input type="hidden" name="utm_campaign" /></label>
        <label>UTM Term: <input type="hidden" name="utm_term" /></label>
        <label>UTM Content: <input type="hidden" name="utm_content" /></label>
        <label>Referrer: <input type="hidden" name="referrer" /></label>
        <label>Page URL: <input type="hidden" name="page_url" /></label>
        <label>Submitted At: <input type="hidden" name="submitted_at" /></label>
        <label>Lead Source: <input type="hidden" name="lead_source" /></label>
        
        <!-- Honeypot anti-spam protection -->
        <input type="hidden" name="bot-field" />
    </form>
</body>
</html>
